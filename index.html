<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <p id="logo">My Website</p>
    <div class="sidebar" id="sidebar">
        <button class="theme"><i class="fa fa-moon-o"></i></button>
        <button class="close-btn" id="closeSidebar"><i class="fa fa-close"></i></button>
        <nav>
           
        </nav>
    </div>

    <button class="sidebar-toggle" id="openSidebar" ><i class="fa fa-list"></i></button>

    <div class="container">
        <button class="option"><i class="fa fa-plus"></i></button>
        <button class="option"><i class="fa fa-microphone"></i></button>
        <input type="text" placeholder="Tell me your ideas..." id="text">
        <button class="option" onclick="add()"><i class="fa fa-paper-plane"></i></button>
    </div>

    <script src="script.js"></script>
</body>
</html>
